name: Test Load Nonebot Plugin

on:
  push:
    branches:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Install uv and set the python version
      uses: astral-sh/setup-uv@v5
      with:
        python-version: ${{ matrix.python-version }}
          
    - name: Run Nonebot
      run: |
        source .venv/bin/activate
        uv sync --all-extras --dev
        export ENVIRONMENT=dev
        (timeout 60s nb run | tee output.log) &
        PID=$!
        trap "kill $PID" EXIT
        while ! grep -q "Uvicorn running" output.log; do sleep 1; done
        kill $PID
        trap - EXIT
        
    - name: Check Load Plugin Failure
      run: |
        cat output.log
        if grep -q 'Failed to import' output.log; then
          echo "Import failure detected"
          exit 1
        fi